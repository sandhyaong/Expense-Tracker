{% extends "base.html" %}

{% block content %}

<h3>Departments</h3>

<a href="{% url 'add_department' %}" class="btn btn-primary mb-3">
Add Department
</a>

<table class="table table-bordered">

<tr>
<th>Name</th>
<th width="200">Action</th>
</tr>

{% for d in departments %}

<tr>

<td>{{ d.name }}</td>

<td>

<a href="{% url 'edit_department' d.id %}" class="btn btn-warning btn-sm">
Edit
</a>

<a href="{% url 'delete_department' d.id %}" 
class="btn btn-danger btn-sm"
onclick="return confirm('Delete this department?')">
Delete
</a>

</td>

</tr>

{% endfor %}

</table>

{% endblock %}

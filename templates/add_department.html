{% extends "base.html" %}

{% block content %}
<style>
    .page-header {
        font-family: 'Playfair Display', serif;
        font-size: 2.5rem;
        color: #1a1a1a;
        margin-bottom: 30px;
    }

    .form-container {
        max-width: 600px;
        background: white;
        padding: 40px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.05);
        border: 1px solid #f1f1f1;
        margin-top: 20px;
    }

    .form-label-custom {
        font-family: 'Jost', sans-serif;
        text-transform: uppercase;
        font-size: 0.75rem;
        letter-spacing: 1.5px;
        font-weight: 600;
        color: #1a1a1a;
        margin-bottom: 10px;
        display: block;
    }

    .form-control-custom {
        border: none;
        border-bottom: 1px solid #ddd;
        border-radius: 0;
        padding: 12px 0;
        background: transparent;
        transition: all 0.3s ease;
        font-size: 1.1rem;
        color: #333;
        width: 100%;
        margin-bottom: 35px;
    }

    .form-control-custom:focus {
        box-shadow: none;
        border-color: #c5a880;
        outline: none;
    }

    .btn-gold-action {
        background: #1a1a1a;
        color: white;
        border: 1px solid #1a1a1a;
        border-radius: 0;
        padding: 12px 45px;
        font-family: 'Jost', sans-serif;
        font-weight: 600;
        letter-spacing: 2px;
        text-transform: uppercase;
        transition: 0.4s;
        text-decoration: none;
        display: inline-block;
        border: 1px solid #1a1a1a;
    }

    .btn-gold-action:hover {
        background: transparent;
        color: #1a1a1a;
    }

    .btn-cancel {
        font-family: 'Jost', sans-serif;
        text-transform: uppercase;
        font-size: 0.8rem;
        letter-spacing: 1px;
        color: #999;
        text-decoration: none;
        margin-left: 25px;
        transition: 0.3s;
    }

    .btn-cancel:hover {
        color: #e74a3b;
    }
</style>

<div class="container">
    <div class="row">
        <div class="col-lg-8">
            <h1 class="page-header">Add Department</h1>
            <p class="text-muted mb-4" style="margin-top: -20px;">
                Define a new organizational unit to track and allocate budgets.
            </p>

            <div class="form-container">
                <form method="POST">
                    {% csrf_token %}

                    <div class="mb-2">
                        <label class="form-label-custom">Department Name</label>
                        <input 
                            type="text" 
                            name="name" 
                            class="form-control-custom"
                            placeholder="e.g. Marketing, Operations, IT Support"
                            required
                        >
                    </div>

                    <div class="d-flex align-items-center mt-2">
                        <button type="submit" class="btn btn-gold-action">
                            Save Department
                        </button>
                        <a href="/departments/" class="btn-cancel">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

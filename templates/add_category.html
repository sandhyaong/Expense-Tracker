{% extends "base.html" %}

{% block content %}

<h3>Add Category</h3>

<form method="POST">
{% csrf_token %}

<div class="mb-3">
<label>Name</label>
<input type="text" name="name" class="form-control">
</div>

<div class="mb-3">
<label>Description</label>
<textarea name="description" class="form-control"></textarea>
</div>

<button class="btn btn-success">Save</button>

</form>

{% endblock %}
